    <g transform="translate(982 410)">
      <rect width="350" height="270" rx="22" fill="#121a2d" stroke="#2b3856"/>
      <text x="24" y="40" fill="#8c98b8" font-size="12" font-weight="700" letter-spacing="1.8">WHY IT IS SAFE</text>
      <circle cx="31" cy="79" r="7" fill="#4fd1c5"/>
      <text x="51" y="84" fill="#dce3f7" font-size="14">Preview is the default</text>
      <circle cx="31" cy="120" r="7" fill="#4fd1c5"/>
      <text x="51" y="125" fill="#dce3f7" font-size="14">No invented personalization</text>
      <circle cx="31" cy="161" r="7" fill="#4fd1c5"/>
      <text x="51" y="166" fill="#dce3f7" font-size="14">Approval binds exact payload</text>
      <circle cx="31" cy="202" r="7" fill="#4fd1c5"/>
      <text x="51" y="207" fill="#dce3f7" font-size="14">Hash-chain integrity is checked</text>
      <rect x="24" y="228" width="302" height="1" fill="#2b3856"/>
      <text x="24" y="252" fill="#7885a3" font-size="11">No API key · no PII · no external write</text>
    </g>
  </g>
</svg>
