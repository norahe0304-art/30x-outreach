    <g transform="translate(68 410)">
      <rect width="884" height="270" rx="22" fill="#0d1424" stroke="#2b3856"/>
      <text x="26" y="40" fill="#8c98b8" font-size="12" font-weight="700" letter-spacing="1.8">LEARNING REPORT</text>
      <text x="26" y="78" fill="#f0f4ff" font-size="23" font-weight="700">demo-ai-demand-001</text>
      <text x="26" y="105" fill="#7e8aa8" font-size="14">Heads of Growth · B2B AI · 20–100 employees</text>
      <line x1="26" y1="130" x2="858" y2="130" stroke="#25314b"/>

      <circle cx="116" cy="196" r="52" fill="none" stroke="#1e2942" stroke-width="12"/>
      <circle cx="116" cy="196" r="52" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round" stroke-dasharray="326.7" transform="rotate(-90 116 196)"/>
      <text x="116" y="200" fill="#f2f6ff" font-size="28" font-weight="800" text-anchor="middle">100</text>
      <text x="116" y="220" fill="#7e8aa8" font-size="10" text-anchor="middle">QUALITY</text>

      <text x="208" y="178" fill="#7e8aa8" font-size="12" font-weight="700" letter-spacing="1.4">DECISION</text>
      <text x="208" y="223" fill="#68d391" font-size="42" font-weight="850">SCALE</text>

      <g transform="translate(420 156)">
        <text fill="#7e8aa8" font-size="12" font-weight="700" letter-spacing="1.2">QUALITY GATE</text>
        <rect y="22" width="410" height="12" rx="6" fill="#1b253d"/>
        <rect y="22" width="410" height="12" rx="6" fill="url(#accent)"/>
        <text y="62" fill="#aab5d2" font-size="13">10 / 10 lenses passed</text>
        <text x="250" y="62" fill="#aab5d2" font-size="13">0 hard blockers</text>
      </g>
