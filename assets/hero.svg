<!--
[INPUT]: 依赖 30x demo 的质量分、决策状态、安全边界与 learning ledger 概念
[OUTPUT]: 对外提供 README 首屏 1400×760 SVG 产品图
[POS]: assets 的主视觉；只表达离线 demo 能力，不宣称真实 campaign 结果
[PROTOCOL]: 变更时更新此头部，然后检查 AGENTS.md
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title description">
  <title id="title">30x Outreach product overview</title>
  <desc id="description">An offline demo showing a verified signal moving through a hypothesis, quality gate, approval, decision, and hash-chained learning ledger.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b14"/>
      <stop offset="1" stop-color="#11172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9b87f5"/>
      <stop offset="1" stop-color="#4fd1c5"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1400" height="760" rx="30" fill="url(#background)"/>
  <circle cx="1180" cy="90" r="180" fill="#6f5de7" opacity=".12" filter="url(#glow)"/>
  <circle cx="180" cy="690" r="190" fill="#35b8ad" opacity=".08" filter="url(#glow)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect x="68" y="56" width="106" height="42" rx="21" fill="#18213a" stroke="#34415f"/>
    <text x="121" y="84" fill="#eaf0ff" font-size="20" font-weight="800" text-anchor="middle">30x</text>
    <text x="194" y="84" fill="#8c98b8" font-size="15" letter-spacing="2.4">OUTREACH</text>
    <rect x="1158" y="56" width="174" height="42" rx="21" fill="#102a29" stroke="#225c58"/>
    <circle cx="1182" cy="77" r="5" fill="#4fd1c5"/>
    <text x="1200" y="82" fill="#7ee5dc" font-size="13" font-weight="700">OFFLINE DEMO</text>

    <text x="68" y="175" fill="#f4f7ff" font-size="62" font-weight="800" letter-spacing="-2.4">Outreach that remembers.</text>
    <text x="68" y="218" fill="#9aa6c5" font-size="20">Verified signals in. Auditable decisions out. Every result becomes reusable memory.</text>

    <g transform="translate(68 276)">
      <path d="M154 46H190 M344 46H380 M534 46H570 M724 46H760" stroke="#3a4765" stroke-width="2"/>
      <path d="M182 39L190 46L182 53 M372 39L380 46L372 53 M562 39L570 46L562 53 M752 39L760 46L752 53" fill="none" stroke="#63708f" stroke-width="2"/>
      <g>
        <rect width="154" height="92" rx="16" fill="#121a2d" stroke="#2b3856"/>
        <circle cx="26" cy="26" r="8" fill="#4fd1c5"/>
        <text x="44" y="31" fill="#eaf0ff" font-size="13" font-weight="700">VERIFIED SIGNAL</text>
        <text x="20" y="64" fill="#8591af" font-size="13">source + observation</text>
      </g>
      <g transform="translate(190)">
        <rect width="154" height="92" rx="16" fill="#121a2d" stroke="#2b3856"/>
        <circle cx="26" cy="26" r="8" fill="#9b87f5"/>
        <text x="44" y="31" fill="#eaf0ff" font-size="13" font-weight="700">HYPOTHESIS</text>
        <text x="20" y="64" fill="#8591af" font-size="13">frozen before launch</text>
      </g>
      <g transform="translate(380)">
        <rect width="154" height="92" rx="16" fill="#121a2d" stroke="#2b3856"/>
        <circle cx="26" cy="26" r="8" fill="#9b87f5"/>
        <text x="44" y="31" fill="#eaf0ff" font-size="13" font-weight="700">10-LENS GATE</text>
        <text x="20" y="64" fill="#8591af" font-size="13">deterministic checks</text>
      </g>
      <g transform="translate(570)">
        <rect width="154" height="92" rx="16" fill="#121a2d" stroke="#2b3856"/>
        <circle cx="26" cy="26" r="8" fill="#f6e05e"/>
        <text x="44" y="31" fill="#eaf0ff" font-size="13" font-weight="700">HUMAN GATE</text>
        <text x="20" y="64" fill="#8591af" font-size="13">SHA-bound approval</text>
      </g>
      <g transform="translate(760)">
        <rect width="154" height="92" rx="16" fill="#121a2d" stroke="#2b3856"/>
        <circle cx="26" cy="26" r="8" fill="#68d391"/>
        <text x="44" y="31" fill="#eaf0ff" font-size="13" font-weight="700">LEARNING</text>
        <text x="20" y="64" fill="#8591af" font-size="13">hash-chained ledger</text>
      </g>
